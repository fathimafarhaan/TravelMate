<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>TravelMate - Places</title>

    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="../css/places.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<header>

    <div class="logo">
        <i class="fa-solid fa-earth-americas"></i>
        <span>TravelMate</span>
    </div>

    <nav>

        <a href="../index.html">Dashboard</a>
        <a href="trips.html">Trips</a>
        <a href="places.html" class="active">Places</a>
        <a href="notes.html">Notes</a>
        <a href="expenses.html">Expenses</a>

    </nav>

</header>

<div class="container">

    <div class="page-title">

        <h1>Places To Visit</h1>

<p>
Add the places you plan to visit during each trip.
</p>

    </div>

    <div class="card">

        <h2>Add Place</h2>

        <form>

    <div class="grid">

        <select id="tripSelect">
    <option selected disabled>Select Trip</option>
</select>

        <input
            type="text"
            placeholder="Place Name"
        >

        <select>

            <option>Not Visited</option>

            <option>Visited</option>

        </select>

    </div>

    <button>

        <i class="fa-solid fa-plus"></i>

        Add Place

    </button>

</form>

    </div>

    <div class="card">

        <h2>Places List</h2>

        <table>

            <thead>

                <tr>

                    <th>Trip ID</th>
                    <th>Place</th>
                    <th>Status</th>
                    <th>Actions</th>

                </tr>

            </thead>

            <tbody>

            </tbody>

        </table>

    </div>

</div>

<script src="../js/places.js"></script>

</body>

</html>
