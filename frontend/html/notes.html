<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>TravelMate - Notes</title>

    <link rel="stylesheet" href="../style.css">

    <link rel="stylesheet" href="../css/notes.css">

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    >

</head>

<body>

<header>

    <div class="logo">

        <i class="fa-solid fa-earth-americas"></i>

        <span>TravelMate</span>

    </div>

    <nav>

        <a href="../index.html">Dashboard</a>

        <a href="trips.html">Trips</a>

        <a href="places.html">Places</a>

        <a href="notes.html" class="active">Notes</a>

        <a href="expenses.html">Expenses</a>

    </nav>

</header>

<div class="container">

    <div class="page-title">

        <h1>Planning Notes</h1>

        <p>
            Save important notes and reminders for each trip.
        </p>

    </div>

    <div class="card">

        <h2>Add Note</h2>

        <form id="noteForm">

            <div class="grid">

                <select id="tripSelect" required>

                    <option selected disabled>
                        Select Trip
                    </option>

                </select>

            </div>

            <textarea
                id="noteText"
                rows="6"
                placeholder="Write your planning note..."
                required
            ></textarea>

            <button type="submit">

                <i class="fa-solid fa-note-sticky"></i>

                Add Note

            </button>

        </form>

    </div>

    <div class="card">

        <h2>Notes List</h2>

        <table>

            <thead>

                <tr>

                    <th>Trip</th>

                    <th>Note</th>
                    <th>Created</th>
                    <th>Actions</th>

                </tr>

            </thead>

            <tbody id="notesTable">

            </tbody>

        </table>

    </div>

</div>

<script src="../js/notes.js"></script>

</body>

</html>
